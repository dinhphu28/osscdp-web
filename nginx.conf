# nginx config for the osscdp-web SPA (single-page app served as static files).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip static text assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Long-cache content-hashed build assets (filenames change per build).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the HTML shell, so a new deploy is picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Client-side routing: serve index.html for any unknown path
    # (React Router owns /connect, /t/:tenantId/*, etc.).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic security headers (the app sends the admin token in the Authorization
    # header, never a cookie; the backend enforces CORS + RBAC).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
